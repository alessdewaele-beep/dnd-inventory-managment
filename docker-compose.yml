services:
  frontend:
    image: alessdw2003/frontend:latest
    ports:
      - "8020:80"
    depends_on:
      - backend

  backend:
    image: alessdw2003/backend:latest
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: example
      DB_NAME: dnd
      DB_PORT: 3306
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: dnd
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db
    ports:
      - "8030:80"

  # phpMyAdmin for the production Aiven MySQL instance. Host/port/SSL CA
  # are read from backend/.env (see aiven-phpmyadmin/config.user.inc.php).
  # Log in with the DB_USER / DB_PASSWORD from that same file.
  phpmyadmin-aiven:
    image: phpmyadmin/phpmyadmin
    env_file:
      - ./backend/.env
    volumes:
      - ./aiven-phpmyadmin/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro
    ports:
      - "8031:80"

volumes:
  db_data:
